{
  "app-id": "dev.linguamesh.LinguaMesh",
  "runtime": "org.gnome.Platform",
  "runtime-version": "49",
  "sdk": "org.gnome.Sdk",
  "sdk-extensions": [
    "org.freedesktop.Sdk.Extension.rust-stable"
  ],
  "command": "linguamesh-linux",
  "finish-args": [
    "--share=ipc",
    "--socket=wayland",
    "--socket=fallback-x11",
    "--device=dri",
    "--share=network",
    "--talk-name=org.freedesktop.secrets",
    "--talk-name=org.freedesktop.Notifications",
    "--filesystem=xdg-data/dev.linguamesh.LinguaMesh"
  ],
  "modules": [
    {
      "name": "rust-toolchain",
      "buildsystem": "simple",
      "build-options": {
        "no-debuginfo": true
      },
      "build-commands": [
        "./install.sh --prefix=/app/rust-1.93.0 --disable-ldconfig"
      ],
      "sources": [
        {
          "type": "archive",
          "url": "https://static.rust-lang.org/dist/rust-1.93.0-x86_64-unknown-linux-gnu.tar.xz",
          "sha256": "b9d9f01a96a2542852ccfddd82194276ba1c86bc76353309ff636b737fc0a772"
        }
      ]
    },
    {
      "name": "linguamesh",
      "buildsystem": "simple",
      "build-options": {
        "append-path": "/app/rust-1.93.0/bin:/usr/lib/sdk/rust-stable/bin"
      },
      "build-commands": [
        "install -Dm644 linguamesh-linux/packaging/flatpak/cargo-config.toml linguamesh-linux/.cargo/config.toml",
        "cd linguamesh-linux && cargo build --release --locked --offline --features gui",
        "install -Dm755 linguamesh-linux/target/release/linguamesh-linux /app/bin/linguamesh-linux",
        "install -Dm644 linguamesh-linux/packaging/flatpak/dev.linguamesh.LinguaMesh.desktop /app/share/applications/dev.linguamesh.LinguaMesh.desktop",
        "install -Dm644 linguamesh-linux/packaging/flatpak/dev.linguamesh.LinguaMesh.metainfo.xml /app/share/metainfo/dev.linguamesh.LinguaMesh.metainfo.xml",
        "install -Dm644 linguamesh-linux/packaging/flatpak/dev.linguamesh.LinguaMesh.svg /app/share/icons/hicolor/scalable/apps/dev.linguamesh.LinguaMesh.svg",
        "rm -rf /app/rust-1.93.0"
      ],
      "sources": [
        {
          "type": "git",
          "url": "https://github.com/getio0909/linguamesh-core.git",
          "commit": "8837e59395742b5385af5037aa36a2596af3b025",
          "dest": "linguamesh-core"
        },
        {
          "type": "git",
          "url": "https://github.com/getio0909/linguamesh-linux.git",
          "commit": "cc5beeea530e500ee2d42b6d05d26dc34a26c7ab",
          "dest": "linguamesh-linux"
        },
        "cargo-sources.json"
      ]
    }
  ]
}
