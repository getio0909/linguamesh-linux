name: Flatpak Linux

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flatpak:
    name: Flatpak SDK build
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - name: Check out Linux client
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Validate Flatpak metadata and source pins
        run: bash tools/validate-flatpak-metadata.sh
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb
        with:
          manifest-path: packaging/flatpak/dev.linguamesh.LinguaMesh.yml
          bundle: linguamesh-linux-x86_64.flatpak
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true
          verbose: true
      - name: Create checksum and SBOM evidence
        run: >-
          python3 tools/create-flatpak-evidence.py
          --bundle linguamesh-linux-x86_64.flatpak
          --manifest packaging/flatpak/dev.linguamesh.LinguaMesh.yml
          --cargo-lock Cargo.lock
          --output-dir flatpak-evidence
      - name: Upload checksum and SBOM evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linguamesh-linux-flatpak-evidence-${{ github.sha }}
          path: flatpak-evidence/
          if-no-files-found: error
      - name: Run Flatpak sandbox smoke
        run: bash tools/run-flatpak-smoke.sh linguamesh-linux-x86_64.flatpak
